<!doctype html><html lang="ar" dir="rtl"><meta charset="utf-8"><title>Coupon Browser Test</title>
<style>body{font-family:Arial;padding:24px;background:#f6f7fb}.card{background:#fff;border-radius:16px;padding:20px;max-width:800px;margin:auto}input,select,button{padding:10px;margin:4px}#browserTestResult{margin-top:20px;font-weight:700}</style>
<div class="card"><div id="adminContent"></div><div id="browserTestResult">جارٍ الاختبار...</div></div>
<script>
window.db={banners:[]};window.v19Coupons=[{id:'CP-1',code:'ALIN20',discount_type:'percent',discount_value:20,status:'active',used_count:0,max_uses:0}];
window.esc=v=>String(v??'');window.money=v=>Number(v||0).toLocaleString('ar-IQ');window.uid=()=>`CP-${Date.now()}`;
window.query=async()=>window.v19Coupons;window.insert=async(_t,row)=>{window.__insertCount=(window.__insertCount||0)+1;window.v19Coupons.push(row);return row};window.update=async()=>{};window.removeRow=async()=>{};window.audit=async()=>{};window.load=async()=>{};window.toast=()=>{};window.adminTab=()=>{};window.markAdminTab=()=>{};
window.alert=msg=>{window.__alert=String(msg)};window.confirm=()=>true;window.prompt=()=>'';
</script>
<script src="../modules/admin/marketing.js"></script>
<script>
addEventListener('load',async()=>{
  renderCouponsAdminV140();
  v140CpCode.value=' alin20 ';
  v140CpValue.value='10';
  await saveCouponV140();
  const ok=(window.__insertCount||0)===0 && /موجود مسبقًا/.test(window.__alert||'');
  browserTestResult.textContent=ok?'نجح: منع تكرار الكوبون ورسالة عربية واضحة':'فشل الاختبار';
  browserTestResult.dataset.ok=String(ok);
});
</script></html>
