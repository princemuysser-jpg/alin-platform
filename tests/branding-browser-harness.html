<!doctype html><html lang="ar" dir="rtl" data-alin-theme="light" data-alin-theme-mode="light"><head><meta charset="utf-8"><title>branding test</title></head><body>
<div id="adminContent" class="panel"></div>
<script>
window.db={settings:{platform_name:'منصة آلين'}};
window.settingsSet=async(key,value)=>{window.db.settings[key]=String(value)};
window.uploadFile=async(path,file)=>`alin-files/${path}/${file.name}`;
window.audit=async()=>true;window.toast=()=>{};window.esc=value=>String(value??'');window.mediaUrl=value=>value;
window.AlinAdminModules={register:(name,render)=>{window.__brandRender=render}};
</script>
<script src="../modules/admin/branding.js?v=2.4.2"></script>
<script>
window.addEventListener('load',async()=>{
  await new Promise(r=>setTimeout(r,20));
  window.__brandRender(document.getElementById('adminContent'));
  const template=document.querySelector('[data-theme="sage-calm"]');template.click();
  document.getElementById('ab235Save').click();
  await new Promise(r=>setTimeout(r,120));
  const result={
    appearance:document.documentElement.dataset.alinTheme,
    brand:document.documentElement.dataset.alinBrandTheme,
    presetCount:document.querySelectorAll('.ab235-template').length,
    status:document.getElementById('ab235Status').textContent,
    primary:window.db.settings.visual_primary,
    hasUploads:document.querySelectorAll('.ab235-upload').length
  };
  const pre=document.createElement('pre');pre.id='result';pre.textContent=JSON.stringify(result);document.body.appendChild(pre);document.body.dataset.done='1';
});
</script></body></html>
