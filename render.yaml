services:
  - type: web
    name: alin-platform-test
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 server:app
    envVars:
      - key: ALIN_SECRET
        generateValue: true
      - key: ALIN_ADMIN_USER
        value: admin
      - key: ALIN_ADMIN_PASS
        sync: false
