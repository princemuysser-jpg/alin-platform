<!DOCTYPE html>

<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<meta content="#0b1830" name="theme-color"/>
<title>منصة آلين</title>
<style>html,body{margin:0;min-height:100%;background:#0b1830}noscript{display:block;padding:24px;color:#fff;font-family:Tahoma,"Segoe UI",sans-serif;text-align:center}noscript a{color:#f0c75e;margin:0 8px}</style>
<script>
    (()=>{
      const key='alin_device_view';
      try{
        const current=new URL(location.href);
        const forced=current.searchParams.get('view');
        let chosen=forced==='mobile'||forced==='desktop'?forced:'';
        if(chosen){
          try{sessionStorage.setItem(key,chosen)}catch(_){ }
        }else{
          try{
            const saved=sessionStorage.getItem(key);
            if(saved==='mobile'||saved==='desktop')chosen=saved;
          }catch(_){ }
        }
        if(!chosen){
          const viewportWidth=window.visualViewport&&window.visualViewport.width;
          const width=Math.max(1,Math.round(viewportWidth||window.innerWidth||document.documentElement.clientWidth||1024));
          let coarse=false,hoverNone=false,portrait=false,touch=false;
          try{coarse=matchMedia('(pointer: coarse)').matches;hoverNone=matchMedia('(hover: none)').matches;portrait=matchMedia('(orientation: portrait)').matches}catch(_){portrait=innerHeight>=innerWidth}
          try{touch=(navigator.maxTouchPoints||0)>0}catch(_){ }
          const ua=String(navigator.userAgent||'');
          const hintedMobile=!!(navigator.userAgentData&&navigator.userAgentData.mobile===true);
          const phone=hintedMobile||/iPhone|iPod|Android.+Mobile|Windows Phone|Mobile/i.test(ua)||(width<800&&coarse);
          const tablet=/iPad|Tablet|Kindle|Silk|Android(?!.*Mobile)/i.test(ua)||(/Macintosh/i.test(ua)&&touch)||((coarse||hoverNone)&&touch&&width>=800&&width<=1180);
          chosen=phone?'mobile':tablet&&(portrait||width<1000)?'mobile':'desktop';
          try{sessionStorage.setItem(key,chosen)}catch(_){ }
        }
        current.searchParams.delete('view');
        current.pathname=current.pathname.replace(/[^/]*$/,'')+(chosen==='mobile'?'store-mobile.html':'store-desktop.html');
        location.replace(current.href);
      }catch(_){
        const fallback=(window.innerWidth||1024)<800?'store-mobile.html':'store-desktop.html';
        let query='';
        try{
          query=String(location.search||'').replace(/^\?/,'').split('&').filter(part=>{
            if(!part)return false;
            let key=part.split('=')[0].replace(/\+/g,' ');
            try{key=decodeURIComponent(key)}catch(_){ }
            return key!=='view';
          }).join('&');
        }catch(_){query=''}
        location.replace('./'+fallback+(query?'?'+query:'')+String(location.hash||''));
      }
    })();
  </script>
<link href="./dist/css/landing.bundle.css?v=1.0.1" rel="stylesheet"/>
</head>
<body>
<noscript>يلزم تشغيل JavaScript للاختيار التلقائي. <a href="./store-mobile.html">فتح الواجهة الخفيفة</a><a href="./store-desktop.html">فتح الواجهة الواسعة</a></noscript>
<script src="./dist/js/landing.bundle.js?v=1.0.1"></script>
</body>
</html>
